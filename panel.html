<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>User Panel - Planetary Distance Auth</title>
  <style>
    :root {
      --bg1: #0d1b2a;
      --bg2: #1b263b;
      --card: #22324d;
      --accent: #fca311;
      --text: #e0e1dd;
      --muted: #9fb0c2;
    }
    body {
      margin: 0;
      font-family: "Georgia", "Times New Roman", serif;
      background: radial-gradient(circle at 20% 20%, #1b2b4b, var(--bg1)) no-repeat fixed;
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    .card {
      background: linear-gradient(160deg, var(--card), #152238);
      padding: 28px 30px;
      border-radius: 14px;
      width: min(420px, 92vw);
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.08);
    }
    h1 {
      margin: 0 0 8px 0;
      font-size: 22px;
      letter-spacing: 0.5px;
    }
    p {
      margin: 0 0 18px 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }
    button {
      width: 100%;
      margin-top: 14px;
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #111827;
      font-weight: 700;
      cursor: pointer;
    }
    .note {
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
    }
    .output {
      margin-top: 12px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      font-size: 13px;
      min-height: 24px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>User Panel</h1>
    <p>This device is enrolled. Use your device code to add new devices, or your recovery phrase if you lose access.</p>

    <button id="logoutBtn">Logout</button>

    <div class="note">To add another device, log in there and enter your 8-digit device code.</div>
    <div class="output" id="result"></div>
  </div>

  <script>
    const sessionUser = localStorage.getItem("sessionUser") || "";
    const sessionToken = localStorage.getItem("sessionToken") || "";

    if (!sessionUser || !sessionToken) {
      document.getElementById("result").textContent = "No active session. Please login first.";
    } else {
      // Validate the session server-side; bounce to login if expired/invalid.
      fetch("login.php", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        cache: "no-store",
        body: JSON.stringify({ action: "verify_session", username: sessionUser, token: sessionToken })
      }).then(r => r.json()).then(d => {
        if (!d || !d.ok) {
          localStorage.removeItem("sessionUser");
          localStorage.removeItem("sessionToken");
          window.location.href = "index.html";
        }
      }).catch(() => {});
    }

    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("sessionUser");
      localStorage.removeItem("sessionToken");
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
